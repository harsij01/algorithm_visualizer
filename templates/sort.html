<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="initial-scale=1, width=device-width">
        <title>Algorithm Visualizer</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <div class="controls">
            <label>Algorithm 1:</label>
            <select id="algorithmSelect1">
                <option value="bubble">Bubble</option>
                <option value="selection">Selection</option>
                <option value="insertion">Insertion</option>
                <option value="merge">Merge</option>
            </select>

            <label>Algorithm 2:</label>
            <select id="algorithmSelect2">
                <option value="bubble">Bubble</option>
                <option value="selection">Selection</option>
                <option value="insertion">Insertion</option>
                <option value="merge">Merge</option>
            </select>

            <select id="modeSelect">
                <option value="visual">Visual</option>
                <option value="benchmark">Benchmark</option>
            </select>

            <input type="text" id="arrayInput" placeholder="Enter numbers separated by commas">
            <button onclick="sendArray()">Sort</button>

            <input type="number" id="arraySize" placeholder="Size" value="20">
            <input type="number" id="maxValue" placeholder="Max Value" value="100">

            <button onclick="generateRandom()">Generate Random</button>
        </div>

        <div id="barContainer" class="bar-container"></div>

        <!-- Chart container -->
        <canvas id="runtimeChart" width="400" height="200"></canvas>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="{{ url_for('static', filename='script.js') }}"></script>
    </body>
</html>
