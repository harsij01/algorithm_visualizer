<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Algorithm Visualizer</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Bootstrap Icons for clarity -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    </head>
    <body>
        <h1 class="title">Algorithm Visualizer</h1>
        <div class="container my-3">
            <div class="row g-2 align-items-center">
                <div class="col-md-3">
                    <label for="algorithmSelect1" class="form-label">Algorithm 1</label>
                    <select id="algorithmSelect1" class="form-select">
                        <option value="bubble">Bubble</option>
                        <option value="selection">Selection</option>
                        <option value="insertion">Insertion</option>
                        <option value="merge">Merge</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="algorithmSelect2" class="form-label">Algorithm 2</label>
                    <select id="algorithmSelect2" class="form-select">
                        <option value="bubble">Bubble</option>
                        <option value="selection">Selection</option>
                        <option value="insertion">Insertion</option>
                        <option value="merge">Merge</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label for="modeSelect" class="form-label">Mode</label>
                    <select id="modeSelect" class="form-select">
                        <option value="visual">Visual</option>
                        <option value="benchmark">Benchmark</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label for="speedControl" class="form-label">Speed (ms)</label>
                    <input type="range" id="speedControl" min="10" max="500" value="200" class="form-range" data-bs-toggle="tooltip" title="Animation speed">
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button id="runButton" onclick="sendArray()" class="btn btn-primary w-100">Run</button>
                </div>
            </div>

            <div class="row g-2 mt-3">
                <div class="col-md-4">
                    <input type="number" id="arraySize" class="form-control" min="1" max="1000" value="20" placeholder="Array Size" data-bs-toggle="tooltip" title="Number of elements">
                </div>
                <div class="col-md-4">
                    <input type="number" id="maxValue" class="form-control" min="1" max="1000" value="100" placeholder="Max Value" data-bs-toggle="tooltip" title="Maximum value of elements">
                </div>
                <div class="col-md-4">
                    <button id="generateRandomButton" onclick="generateRandom()" class="btn btn-secondary w-100">Generate Random</button>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-12">
                    <input type="text" id="arrayInput" class="form-control" placeholder="Enter numbers separated by commas" data-bs-toggle="tooltip" title="Manual input of array">
                </div>
            </div>
        </div>

        <div id="visualSection">
            <div class="container d-flex justify-content-center gap-3 mt-2">
                <div><i class="bi bi-square-fill text-danger"></i> Comparison</div>
                <div><i class="bi bi-square-fill text-warning"></i> Swap</div>
                <div><i class="bi bi-square-fill text-success"></i> Insert</div>
                <div><i class="bi bi-square-fill text-primary"></i> Append</div>
            </div>
            <div id="barContainer" class="bar-container"></div>
        </div>

        <div id="benchmarkSection" class="container mt-4">
            <div class="card p-3 shadow-sm">
                <canvas id="runtimeChart"></canvas>
                <div id="analysis" class="d-flex flex-wrap justify-content-center mt-3 gap-3"></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="{{ url_for('static', filename='script.js') }}"></script>
        <!-- Bootstrap JS (for tooltips) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
